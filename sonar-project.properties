### SonarCloud Configuration

# Exclude auto-generated, build output, and tooling directories
sonar.exclusions=\
  coverage/**,\
  dist/**,\
  dist-ssr/**,\
  build/**,\
  storybook-static/**,\
  node_modules/**,\
  public/**,\
  **/*.generated.js,\
  **/*.generated.ts,\
  **/*.generated.json

# Exclude test files from duplication detection
sonar.cpd.exclusions=\
  src/**/*.test.ts,\
  src/**/*.test.tsx,\
  src/**/*.spec.ts,\
  src/**/*.spec.tsx,\
  src/tests/**,\
  src/test/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
# Optional: point to your coverage report
# sonar.javascript.lcov.reportPaths=coverage/lcov.info