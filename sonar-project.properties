### SonarCloud Configuration

# Exclude auto-generated, build output, and tooling directories
sonar.exclusions=\
  coverage/**,\
  dist/**,\
  dist-ssr/**,\
  build/**,\
  storybook-static/**,\
  node_modules/**,\
  public/**,\
  **/*.generated.js,\
  **/*.generated.ts,\
  **/*.generated.json

# Optional: point to your coverage report
# sonar.javascript.lcov.reportPaths=coverage/lcov.info