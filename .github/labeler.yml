# .github/labeler.yml
# Automatically applies labels to PRs based on which files were changed.
# Used by actions/labeler in pr-checks.yml
# Labels here must exist in the repo — create them in GitHub → Labels

# ── Feature / UI changes ───────────────────────────────────────────────
feature:
  - changed-files:
      - any-glob-to-any-file:
          - "src/components/**"
          - "src/pages/**"
          - "src/hooks/**"

# ── Content data changes ────────────────────────────────────────────────
content:
  - changed-files:
      - any-glob-to-any-file:
          - "src/data/**"

# ── Styling only ────────────────────────────────────────────────────────
style:
  - changed-files:
      - any-glob-to-any-file:
          - "src/styles/**"
          - "src/index.css"
          - "tailwind.config.*"

# ── Documentation ────────────────────────────────────────────────────────
docs:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - "docs/**"
          - ".github/**/*.md"

# ── Dependencies ─────────────────────────────────────────────────────────
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "package-lock.json"

# ── CI / DevOps ───────────────────────────────────────────────────────────
ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/dependabot.yml"
          - ".github/labeler.yml"
          - "lighthouserc*.js"

# ── Configuration changes ─────────────────────────────────────────────────
chore:
  - changed-files:
      - any-glob-to-any-file:
          - "vite.config.*"
          - "tsconfig*.json"
          - "eslint.config.*"
          - ".prettierrc"
          - "vitest.config.*"

# ── Tests ─────────────────────────────────────────────────────────────────
test:
  - changed-files:
      - any-glob-to-any-file:
          - "src/**/*.test.*"
          - "src/**/*.spec.*"
          - "src/test/**"
          - "src/tests/**"

# ── Security ──────────────────────────────────────────────────────────────
security:
  - changed-files:
      - any-glob-to-any-file:
          - "public/_headers"
          - "src/config/validateEnv.ts"
          - "src/utils/sanitize.ts"

# ── Performance ───────────────────────────────────────────────────────────
performance:
  - changed-files:
      - any-glob-to-any-file:
          - "public/_headers"
          - "vite.config.*"
          - "src/hooks/useLazyImage.ts"
