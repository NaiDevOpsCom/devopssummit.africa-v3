version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"

    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"

    open-pull-requests-limit: 10
    target-branch: "main"

    # ✅ ONLY allow direct dependencies (reduces random breakage)
    allow:
      - dependency-type: "direct"

    # ✅ BLOCK all major updates globally (not just React)
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

    # ✅ Group ONLY safe updates
    groups:
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "react-router*"
          - "@types/react*"
        update-types:
          - "minor"
          - "patch"

      typescript-tooling:
        patterns:
          - "typescript"
          - "ts-*"
          - "@typescript-eslint/*"
        update-types:
          - "minor"
          - "patch"

      testing-suite:
        patterns:
          - "jest*"
          - "@testing-library/*"
          - "vitest*"
          - "playwright*"
        update-types:
          - "minor"
          - "patch"

      linting-formatting:
        patterns:
          - "eslint*"
          - "prettier*"
          - "@eslint/*"
        update-types:
          - "minor"
          - "patch"

      build-tooling:
        patterns:
          - "vite*"
          - "webpack*"
          - "rollup*"
          - "esbuild*"
        update-types:
          - "minor"
          - "patch"

    labels:
      - "dependencies"
      - "automated"

    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"

  # ── GitHub Actions ───────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"

    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"

    open-pull-requests-limit: 5

    # ✅ Also block major updates for actions
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

    labels:
      - "dependencies"
      - "ci/cd"
      - "automated"

    commit-message:
      prefix: "chore(actions)"
      include: "scope"
