version: 2
updates:
  # ── npm dependencies ─────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Africa/Nairobi" # changed from UTC
    open-pull-requests-limit: 10
    target-branch: "staging"

    # Only update direct dependencies — reduces random transitive breakage
    allow:
      - dependency-type: "direct"

    # Block all major version bumps globally — review these manually
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

    groups:
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "react-router*"
          - "@types/react*"
        update-types:
          - "minor"
          - "patch"

      typescript-tooling:
        patterns:
          - "typescript"
          - "ts-*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
        update-types:
          - "minor"
          - "patch"

      testing-suite:
        patterns:
          - "@testing-library/*"
          - "vitest*"
          - "@vitest/*"
          - "playwright*"
          - "@playwright/*"
        update-types:
          - "minor"
          - "patch"

      linting-formatting:
        patterns:
          - "eslint*"
          - "prettier*"
          - "@eslint/*"
        update-types:
          - "minor"
          - "patch"

      build-tooling:
        # Note: we use "vite" exactly (not "vite*") to avoid overlapping with
        # "vitest*" in the testing-suite group above.
        patterns:
          - "vite"
          - "@vitejs/*"
          - "rollup*"
          - "esbuild*"
          - "@tailwindcss/*"
          - "tailwindcss*"
        update-types:
          - "minor"
          - "patch"

      # ── Added: Radix UI — every shadcn component depends on these ────
      radix-ui:
        patterns:
          - "@radix-ui/*"
        update-types:
          - "minor"
          - "patch"

      # ── Added: Storybook — groups all @storybook/* into one PR ───────
      storybook:
        patterns:
          - "@storybook/*"
          - "storybook"
          - "@chromatic-com/*"
        update-types:
          - "minor"
          - "patch"

    labels:
      - "dependencies"
      - "automated"

    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"

  # ── GitHub Actions ────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Africa/Nairobi" # changed from UTC
    open-pull-requests-limit: 5
    target-branch: "staging"

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

    labels:
      - "dependencies"
      - "ci" # changed from "ci/cd" — slash causes label issues
      - "automated"

    commit-message:
      prefix: "chore(actions)"
      include: "scope"
