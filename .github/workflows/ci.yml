# .github/workflows/ci.yml
name: CI Quality Gates

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ── TypeScript ─────────────────────────────────────────────
  typecheck:
    name: 🔷 TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npx tsc --noEmit --pretty
        # --pretty gives coloured output with error codes
        # Fails on: type mismatches, missing props, implicit any, etc.

  # ── ESLint ─────────────────────────────────────────────────
  lint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: |
          echo "Running ESLint — max-warnings=0 means warnings = failures"
          npx eslint . \
            --ext .ts,.tsx \
            --max-warnings=0 \
            --format=stylish
        # stylish format: groups errors by file, shows rule name + line
        # e.g.  src/components/Card.tsx
        #         12:5  error  'foo' is defined but never used  no-unused-vars

  # ── Prettier ───────────────────────────────────────────────
  format:
    name: 🎨 Prettier Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: |
          echo "Checking code formatting..."
          npx prettier --check . --ignore-path .prettierignore --log-level=warn
        # Lists every file that differs from Prettier's expected output
        # Fix locally with: npm run format

  # ── Tests ──────────────────────────────────────────────────
  # ── Unit & Integration Tests ──────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Run unit tests with coverage
        run: npx vitest run --coverage --reporter=verbose --reporter=github-actions
        env:
          # Provide stub values so env validation doesn't fail
          VITE_IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/test
          VITE_IMAGEKIT_PUBLIC_KEY: test_public_key
          VITE_APP_NAME: Africa DevOps Summit Test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always() # Upload even if tests fail — useful for debugging
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Storybook Tests (separate — needs browser) ────────────────────
  # Only runs on PRs to main, not on every push to staging
  # Uncomment when Storybook stories are fully set up
  # storybook-tests:
  #   name: 📚 Storybook Tests
  #   runs-on: ubuntu-latest
  #   if: github.base_ref == 'main'
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: ${{ env.NODE_VERSION }}
  #         cache: "npm"
  #     - run: npm ci
  #     - run: npx playwright install chromium --with-deps
  #     - run: npm run build-storybook -- --quiet
  #     - run: npx vitest run --project=storybook

  # ── Build Verification ─────────────────────────────────────
  build-check:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    needs: [typecheck, lint, format, test] # Only build if quality gates pass
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (skip gallery fetch in CI)
        run: npm run build:bundle
        env:
          # Provide stub env vars so build doesn't fail on missing vars
          VITE_APP_ENV: staging
          VITE_API_URL: https://staging-api.example.com
          SKIP_GALLERY_FETCH: "true"
        # Note: runs vite build directly, not npm run build
        # This avoids re-running typecheck/lint (already done above)
        # and skips prebuild:bundle if SKIP_GALLERY_FETCH is handled in script

      - name: Report bundle size
        run: |
          if [ -d dist ]; then
            echo "=== Bundle Size Report ==="
            du -sh dist/
            echo ""
            if [ -d dist/assets ]; then
              echo "=== Asset breakdown ==="
              find dist/assets -type f | sort | while read f; do
                size=$(du -sh "$f" | cut -f1)
                echo "$size  $f"
              done
            else
              echo "no assets directory"
            fi
          else
            echo "no dist directory"
          fi

  # ── Security ───────────────────────────────────────────────
# ── Security ───────────────────────────────────────────────
  security:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history required for secret scanning

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Dependency vulnerability audit ──────────────────────
      # Fails CI on high/critical severity vulnerabilities
      # Run 'npm audit fix' locally to resolve fixable issues
      # Remove --omit=dev to also scan devDependencies (recommended)
      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      # ── Secret leak detection ────────────────────────────────
      # Scans full git history for accidentally committed secrets:
      # API keys, tokens, private keys, connection strings
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # ── Required Cloudflare Pages files ──────────────────────
      # These must exist in public/ or CF Pages serves without
      # security headers and SPA routing breaks on direct URLs
      - name: Validate public/_headers exists
        run: |
          if [ ! -f "public/_headers" ]; then
            echo "❌ public/_headers is missing"
            echo "   Security headers will NOT be served by Cloudflare Pages"
            echo "   Create public/_headers — see docs/security-headers.md"
            exit 1
          fi
          echo "✅ public/_headers present"
          echo "--- Contents preview ---"
          head -20 public/_headers

      - name: Validate public/_redirects exists
        run: |
          if [ ! -f "public/_redirects" ]; then
            echo "❌ public/_redirects is missing"
            echo "   Direct navigation to /about, /schedule etc. will return 404"
            echo "   Create public/_redirects with: /*    /index.html    200"
            exit 1
          fi
          echo "✅ public/_redirects present"
          cat public/_redirects