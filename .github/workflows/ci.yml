# .github/workflows/ci.yml
name: CI Quality Gates

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ── TypeScript ─────────────────────────────────────────────
  typecheck:
    name: 🔷 TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npx tsc --noEmit --pretty
        # --pretty gives coloured output with error codes
        # Fails on: type mismatches, missing props, implicit any, etc.

  # ── ESLint ─────────────────────────────────────────────────
  lint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: |
          echo "Running ESLint — max-warnings=0 means warnings = failures"
          npx eslint . \
            --ext .ts,.tsx \
            --max-warnings=0 \
            --format=stylish
        # stylish format: groups errors by file, shows rule name + line
        # e.g.  src/components/Card.tsx
        #         12:5  error  'foo' is defined but never used  no-unused-vars

  # ── Prettier ───────────────────────────────────────────────
  format:
    name: 🎨 Prettier Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: |
          echo "Checking code formatting..."
          npx prettier --check . --ignore-path .prettierignore --log-level=warn
        # Lists every file that differs from Prettier's expected output
        # Fix locally with: npm run format

  # ── Tests ──────────────────────────────────────────────────
  test:
    name: 🧪 Vitest Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=verbose
        # verbose reporter shows each test name + pass/fail + duration
        # coverage fails if thresholds in vitest.config.ts aren't met

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: coverage/

  # ── Build Verification ─────────────────────────────────────
  build-check:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    needs: [typecheck, lint, format, test] # Only build if quality gates pass
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (skip gallery fetch in CI)
        run: npm run build:bundle
        env:
          # Provide stub env vars so build doesn't fail on missing vars
          VITE_APP_ENV: staging
          VITE_API_URL: https://staging-api.example.com
          SKIP_GALLERY_FETCH: "true"
        # Note: runs vite build directly, not npm run build
        # This avoids re-running typecheck/lint (already done above)
        # and skips prebuild:bundle if SKIP_GALLERY_FETCH is handled in script

      - name: Report bundle size
        run: |
          if [ -d dist ]; then
            echo "=== Bundle Size Report ==="
            du -sh dist/
            echo ""
            if [ -d dist/assets ]; then
              echo "=== Asset breakdown ==="
              find dist/assets -type f | sort | while read f; do
                size=$(du -sh "$f" | cut -f1)
                echo "$size  $f"
              done
            else
              echo "no assets directory"
            fi
          else
            echo "no dist directory"
          fi

  # ── Security ───────────────────────────────────────────────
  security:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        continue-on-error: true
        run: |
          echo "=== npm audit ==="
          npm audit --audit-level=high --omit=dev
          # Reports: vulnerability name, severity, affected package, fix available

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
